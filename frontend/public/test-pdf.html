<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 PDF Viewer</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; background: #f8fafc; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        button { background: #2563eb; color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; }
        iframe { width: 100%; height: 600px; border: 2px solid #e2e8f0; border-radius: 8px; margin-top: 1rem; }
        textarea { width: 100%; height: 100px; margin-bottom: 1rem; padding: 0.5rem; font-family: monospace; border: 1px solid #ccc; border-radius: 6px;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>PDF Receipt Viewer sandbox</h2>
            <a id="downloadLink" download="receipt.pdf" style="display: none;">
                <button style="background: #10b981;">Download PDF</button>
            </a>
        </div>
        
        <p>Paste the massive <code>data:application/pdf;base64,...</code> string from your database below:</p>
        <textarea id="pdfInput" placeholder="data:application/pdf;base64,JVBERi..."></textarea>
        
        <button onclick="loadPdf()">View PDF Preview</button>

        <div style="margin-top: 2rem;">
            <iframe id="pdfViewer" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        function loadPdf() {
            const input = document.getElementById('pdfInput').value.trim();
            if (!input.startsWith('data:application/pdf;base64,')) {
                alert('Please enter a valid Base64 PDF string starting with data:application/pdf;base64,');
                return;
            }

            // 1. Immediately inject the string into the iframe src
            document.getElementById('pdfViewer').src = input;

            // 2. Set up the download hyperlink
            const downloadLink = document.getElementById('downloadLink');
            downloadLink.href = input;
            downloadLink.style.display = 'block';
        }
    </script>
</body>
</html>
